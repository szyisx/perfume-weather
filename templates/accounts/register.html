{% extends "base.html" %}
{% block title %}Регистрация — PerfumeWeather{% endblock %}

{% block content %}
<section class="container-xxl">
  <div class="pw-form-card">
    <span class="pw-section-eyebrow">Аккаунт</span>
    <h1 class="mt-2">Регистрация</h1>
    <p class="text-secondary">Форма подключится на этапе 6.</p>

    <form method="post" action="#" class="mt-3">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label small text-secondary">Логин</label>
        <input type="text" name="username" class="form-control form-control-lg" disabled>
      </div>
      <div class="mb-3">
        <label class="form-label small text-secondary">Email</label>
        <input type="email" name="email" class="form-control form-control-lg" disabled>
      </div>
      <div class="mb-3">
        <label class="form-label small text-secondary">Пароль</label>
        <input type="password" name="password1" class="form-control form-control-lg" disabled>
      </div>
      <div class="mb-3">
        <label class="form-label small text-secondary">Повтор пароля</label>
        <input type="password" name="password2" class="form-control form-control-lg" disabled>
      </div>
      <button type="submit" class="btn pw-btn-accent w-100 py-2" disabled>Создать аккаунт</button>
    </form>

    <p class="small text-secondary mt-4 text-center mb-0">
      Уже есть аккаунт? <a class="pw-text-accent" href="{% url 'login' %}">Войти</a>
    </p>
  </div>
</section>
{% endblock %}
