{% extends "base.html" %}
{% block title %}Каталог парфюмов — PerfumeWeather{% endblock %}

{% block content %}
<section class="container-xxl">
  <div class="d-flex align-items-end justify-content-between flex-wrap gap-3 mb-4">
    <div>
      <span class="pw-section-eyebrow">Каталог</span>
      <h1 class="pw-section-title mt-2 mb-0">Все парфюмы</h1>
    </div>
    <p class="text-secondary mb-0">Этап 4 покажет реальные карточки из БД.</p>
  </div>

  <div class="row g-4">
    {% for i in "12345678" %}
      <div class="col-6 col-md-4 col-lg-3">
        <div class="pw-card h-100">
          <div class="pw-card-image">P/W</div>
          <div class="pw-card-body">
            <div class="pw-card-brand">Demo Brand</div>
            <div class="pw-card-name">Парфюм {{ forloop.counter }}</div>
            <span class="pw-chip">Свежие</span>
            <span class="pw-chip">Цитрусовые</span>
          </div>
        </div>
      </div>
    {% endfor %}
  </div>
</section>
{% endblock %}
