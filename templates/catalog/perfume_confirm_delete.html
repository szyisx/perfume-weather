{% extends "base.html" %}
{% block title %}Удаление {{ object.name }} — PerfumeWeather{% endblock %}

{% block content %}
<section class="container-xxl">
  <div class="pw-form-card text-center">
    <span class="pw-section-eyebrow">Удаление</span>
    <h1 class="mt-2" style="font-family: var(--pw-font-display);">Удалить парфюм?</h1>
    <p class="text-secondary">
      «{{ object.brand.name }} — {{ object.name }}» будет удалён без возможности восстановления.
    </p>
    <form method="post" class="mt-3">
      {% csrf_token %}
      <div class="d-flex justify-content-center gap-3">
        <a href="{% url 'perfume_detail' object.pk %}" class="btn btn-outline-light">Отмена</a>
        <button type="submit" class="btn btn-danger px-4">Удалить</button>
      </div>
    </form>
  </div>
</section>
{% endblock %}
